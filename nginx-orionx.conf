# ORION X - nginx Reverse Proxy
# Lauscht auf 77.90.30.250:25558 und verteilt:
#   /        -> Next.js Frontend (localhost:3000)
#   /api     -> NestJS Backend  (localhost:4000)
#
# Install:  cp nginx-orionx.conf /etc/nginx/sites-available/orionx
#           ln -s /etc/nginx/sites-available/orionx /etc/nginx/sites-enabled/
#           nginx -t && systemctl reload nginx

server {
    listen 77.90.30.250:25558;
    listen [::]:25558;
    server_name _;

    client_max_body_size 50M;

    # API -> Backend (NestJS, Port 4000)
    location /api/ {
        proxy_pass http://127.0.0.1:4000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
    }

    # API-Docs (Swagger)
    location /api/docs/ {
        proxy_pass http://127.0.0.1:4000/api/docs/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Frontend (Next.js, Port 3000)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
